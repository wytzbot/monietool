<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Payroll Tax Calculator 2026</title>
<link rel="stylesheet" href="../style.css">
<style>
.tool-wrap{max-width:900px;margin:32px auto;padding:0 20px}
.calc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px}
.tabs{display:flex;background:var(--navy);border-radius:8px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:12px;border:none;background:transparent;color:var(--muted);font-weight:600;border-radius:6px;cursor:pointer}
.tab.active{background:var(--purple);color:white}
.input-group{margin-bottom:18px}
.input-group label{display:block;font-weight:600;margin-bottom:8px;font-size:14px}
.input-group input,.input-group select{width:100%;background:var(--navy);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-size:16px}
.btn{width:100%;background:var(--purple);color:white;border:none;padding:16px;border-radius:8px;font-weight:700;font-size:16px;cursor:pointer;margin-top:16px}
.results{background:var(--navy);border:1px solid var(--purple);border-radius:8px;padding:24px;margin-top:24px}
.result-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.result-row.total{font-weight:800;font-size:18px;border-top:2px solid var(--purple);margin-top:8px;padding-top:14px}
</style>
</head>
<body>
<header class="header"><div class="container header-inner"><a class="logo" href="../">MONIE<span>TOOLS</span></a></div></header>
<main><div class="tool-wrap">
  <a href="../" style="color:var(--purple);font-weight:600;margin-bottom:20px;display:inline-block">← All Tools</a>
  <h1>🇺🇸 US Payroll Tax Calculator 2026</h1>
  <div class="calc-card">
    <div class="tabs">
      <button class="tab active" data-tab="w2">W-2 Employee</button>
      <button class="tab" data-tab="1099">1099 Contractor</button>
    </div>
    <div class="input-group">
      <label>Annual Gross Pay ($)</label>
      <input type="number" id="grossPay" value="60000" step="1000">
    </div>
    <div class="input-group">
      <label>Filing Status</label>
      <select id="filingStatus">
        <option value="single">Single</option>
        <option value="married">Married Filing Jointly</option>
      </select>
    </div>
    <div class="input-group">
      <label>State Tax Rate (%)</label>
      <input type="number" id="stateRate" value="5" step="0.1">
    </div>
    <button class="btn" id="calculateBtn">Calculate</button>
    <div class="results" id="results" style="display:none">
      <div class="result-row"><span>Federal Tax</span><span id="federal">$0</span></div>
      <div class="result-row"><span>Social Security 6.2%</span><span id="ss">$0</span></div>
      <div class="result-row"><span>Medicare 1.45%</span><span id="medicare">$0</span></div>
      <div class="result-row"><span>State Tax</span><span id="stateTax">$0</span></div>
      <div class="result-row total"><span>Net Pay</span><span id="netPay">$0</span></div>
    </div>
  </div>
</div></main>
<script>
let mode='w2';
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    mode=this.dataset.tab;
    calculate();
  });
});

function calcFedTax(income,status){
  const ded=status==='married'?30000:15000;
  const taxable=Math.max(0,income-ded);
  const brackets=[[11925,0.10],[48475,0.12],[103350,0.22],[197300,0.24],[250525,0.32],[626350,0.35],[Infinity,0.37]];
  let tax=0,prev=0;
  for(const[limit,rate]of brackets){
    if(taxable>prev){
      const amt=Math.min(taxable,limit)-prev;
      tax+=amt*rate;
      prev=limit;
      if(taxable<=limit)break;
    }
  }
  return tax;
}

function calculate(){
  const gross=parseFloat(document.getElementById('grossPay').value)||0;
  const status=document.getElementById('filingStatus').value;
  const stateRate=parseFloat(document.getElementById('stateRate').value)/100||0;
  if(gross<=0)return;
  
  const fedTax=calcFedTax(gross,status);
  const ssBase=Math.min(gross,176100);
  const ssTax=mode==='1099'?ssBase*0.062*2:ssBase*0.062;
  const medicareTax=mode==='1099'?gross*0.0145*2:gross*0.0145;
  const stateTax=gross*stateRate;
  const totalTax=fedTax+ssTax+medicareTax+stateTax;
  const net=gross-totalTax;
  
  document.getElementById('federal').textContent='-$'+fedTax.toFixed(2);
  document.getElementById('ss').textContent='-$'+ssTax.toFixed(2);
  document.getElementById('medicare').textContent='-$'+medicareTax.toFixed(2);
  document.getElementById('stateTax').textContent='-$'+stateTax.toFixed(2);
  document.getElementById('netPay').textContent='$'+net.toFixed(2);
  document.getElementById('results').style.display='block';
}
document.getElementById('calculateBtn').addEventListener('click',calculate);
calculate();
</script>
</body>
  </html>
